<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function BackCalc() {
            const [targetPrice, setTargetPrice] = useState('');
            const [laborSplit, setLaborSplit] = useState(50);
            const [laborRate, setLaborRate] = useState('');
            const [laborOH, setLaborOH] = useState('');
            const [laborProfit, setLaborProfit] = useState('');
            const [materialAdj, setMaterialAdj] = useState('');
            const [materialOH, setMaterialOH] = useState('');
            const [materialProfit, setMaterialProfit] = useState('');
            const [materialTax, setMaterialTax] = useState('');
            const [taxBasis, setTaxBasis] = useState('raw');
            const [includeTax, setIncludeTax] = useState(true);
            const [showSettings, setShowSettings] = useState(false);
            const [darkMode, setDarkMode] = useState(false);

            const toggleTheme = () => {
                const newMode = !darkMode;
                setDarkMode(newMode);
                document.body.classList.toggle('dark-mode', newMode);
            };

            const adjustSplit = (delta) => {
                const newSplit = Math.max(0, Math.min(100, laborSplit + (delta * 5)));
                setLaborSplit(newSplit);
            };

            useEffect(() => {
                const saved = localStorage.getItem('backCalcSettings');
                if (saved) {
                    try {
                        const settings = JSON.parse(saved);
                        if (settings.laborRate) setLaborRate(settings.laborRate);
                        if (settings.laborOH) setLaborOH(settings.laborOH);
                        if (settings.laborProfit) setLaborProfit(settings.laborProfit);
                        if (settings.materialAdj) setMaterialAdj(settings.materialAdj);
                        if (settings.materialOH) setMaterialOH(settings.materialOH);
                        if (settings.materialProfit) setMaterialProfit(settings.materialProfit);
                        if (settings.materialTax) setMaterialTax(settings.materialTax);
                        if (settings.taxBasis) setTaxBasis(settings.taxBasis);
                        if (settings.laborSplit) setLaborSplit(settings.laborSplit);
                    } catch (e) {
                        console.error('Failed to load settings', e);
                    }
                }
            }, []);

            const calculate = () => {
                const target = parseFloat(targetPrice) || 0;
                if (target <= 0) return null;

                const lSplit = laborSplit / 100;
                const mSplit = 1 - lSplit;

                const laborPortion = target * lSplit;
                const materialPortion = target * mSplit;

                const lRate = parseFloat(laborRate) || 0;
                const lOH = (parseFloat(laborOH) || 0) / 100;
                const lProfit = (parseFloat(laborProfit) || 0) / 100;
                const mAdj = (parseFloat(materialAdj) || 0) / 100;
                const mOH = (parseFloat(materialOH) || 0) / 100;
                const mProfit = (parseFloat(materialProfit) || 0) / 100;
                const mTax = (parseFloat(materialTax) || 0) / 100;

                let rawLaborCost = 0;
                if (lRate > 0) {
                    rawLaborCost = laborPortion / (1 + lProfit) / (1 + lOH);
                }
                const laborHours = lRate > 0 ? rawLaborCost / lRate : 0;
                const laborOHAmount = rawLaborCost * lOH;
                const laborProfitAmount = (rawLaborCost + laborOHAmount) * lProfit;
                const laborSubtotal = rawLaborCost + laborOHAmount + laborProfitAmount;

                let rawMaterialCost = 0;
                if (!includeTax) {
                    // No tax applied - don't include tax factor in reverse engineering
                    rawMaterialCost = materialPortion / (1 + mProfit) / (1 + mOH) / (1 + mAdj);
                } else if (taxBasis === 'raw') {
                    // Tax applied to raw + adjustment: Raw*(1+adj)*[(1+oh)*(1+profit) + tax]
                    rawMaterialCost = materialPortion / ((1 + mAdj) * ((1 + mOH) * (1 + mProfit) + mTax));
                } else {
                    // Tax applied to full amount: Raw*(1+adj)*(1+oh)*(1+profit)*(1+tax)
                    rawMaterialCost = materialPortion / (1 + mTax) / (1 + mProfit) / (1 + mOH) / (1 + mAdj);
                }

                const materialAdjAmount = rawMaterialCost * mAdj;
                const adjustedMaterial = rawMaterialCost + materialAdjAmount;
                const materialOHAmount = adjustedMaterial * mOH;
                const materialProfitAmount = (adjustedMaterial + materialOHAmount) * mProfit;
                const materialSubtotal = adjustedMaterial + materialOHAmount + materialProfitAmount;

                let materialTaxAmount = 0;
                if (includeTax && mTax > 0) {
                    if (taxBasis === 'raw') {
                        // Tax on Raw + Adjustment
                        materialTaxAmount = (rawMaterialCost + materialAdjAmount) * mTax;
                    } else {
                        // Tax on Raw + Adjustment + OH + Profit
                        materialTaxAmount = (rawMaterialCost + materialAdjAmount + materialOHAmount + materialProfitAmount) * mTax;
                    }
                }
                const materialTotal = materialSubtotal + materialTaxAmount;

                const combinedTotal = laborSubtotal + materialTotal;

                const round = (num) => Math.round(num * 100) / 100;

                return {
                    laborHours: round(laborHours),
                    rawLaborCost: round(rawLaborCost),
                    laborOHAmount: round(laborOHAmount),
                    laborProfitAmount: round(laborProfitAmount),
                    laborSubtotal: round(laborSubtotal),
                    rawMaterialCost: round(rawMaterialCost),
                    materialAdjAmount: round(materialAdjAmount),
                    materialOHAmount: round(materialOHAmount),
                    materialProfitAmount: round(materialProfitAmount),
                    materialSubtotal: round(materialSubtotal),
                    materialTaxAmount: round(materialTaxAmount),
                    materialTotal: round(materialTotal),
                    combinedTotal: round(combinedTotal),
                };
            };

            const formatCurrency = (num) => `$${num.toFixed(2)}`;
            const formatHours = (num) => num.toFixed(2);

            const results = calculate();

            const handleSaveSettings = () => {
                const settings = {
                    laborRate, laborOH, laborProfit, materialAdj, materialOH, materialProfit, materialTax, taxBasis, laborSplit,
                };
                localStorage.setItem('backCalcSettings', JSON.stringify(settings));
                setShowSettings(false);
            };

            const handleResetSettings = () => {
                if (window.confirm('Clear all saved settings?')) {
                    localStorage.removeItem('backCalcSettings');
                    setLaborRate('');
                    setLaborOH('');
                    setLaborProfit('');
                    setMaterialAdj('');
                    setMaterialOH('');
                    setMaterialProfit('');
                    setMaterialTax('');
                    setTaxBasis('raw');
                    setLaborSplit(50);
                    setTargetPrice('');
                }
            };

            return (
                <div className="backcalc-container">
                    <header className="backcalc-header">
                        <button onClick={toggleTheme} className="theme-toggle">
                            {darkMode ? '☀️ Light' : '🌙 Dark'}
                        </button>
                        <div className="header-content">
                            <svg className="logo" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="24" cy="24" r="22" stroke="white" strokeWidth="2"/>
                                <path d="M24 12V36M12 24H36" stroke="white" strokeWidth="2" strokeLinecap="round"/>
                                <path d="M32 16L16 32M16 16L32 32" stroke="white" strokeWidth="2" strokeLinecap="round" opacity="0.5"/>
                            </svg>
                            <div>
                                <h1>BackCalc</h1>
                                <p>Reverse-engineer labor hours and material costs from target price</p>
                            </div>
                        </div>
                    </header>

                    <div className="backcalc-main">
                        <div className="settings-toggle">
                            <button onClick={() => setShowSettings(!showSettings)} className="settings-btn">
                                ⚙️ {showSettings ? 'Hide' : 'Settings'}
                            </button>
                        </div>

                        {showSettings && (
                            <div className="settings-panel">
                                <h2>Settings</h2>
                                <div className="settings-grid">
                                    <div className="setting-group">
                                        <label>Labor Rate ($/hr)</label>
                                        <input type="number" value={laborRate} onChange={(e) => setLaborRate(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Labor Overhead %</label>
                                        <input type="number" value={laborOH} onChange={(e) => setLaborOH(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Labor Profit %</label>
                                        <input type="number" value={laborProfit} onChange={(e) => setLaborProfit(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Material Adjustment %</label>
                                        <input type="number" value={materialAdj} onChange={(e) => setMaterialAdj(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Material Overhead %</label>
                                        <input type="number" value={materialOH} onChange={(e) => setMaterialOH(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Material Profit %</label>
                                        <input type="number" value={materialProfit} onChange={(e) => setMaterialProfit(e.target.value)} />
                                    </div>
                                    <div className="setting-group">
                                        <label style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                            <input type="checkbox" checked={includeTax} onChange={(e) => setIncludeTax(e.target.checked)} style={{width: '18px', height: '18px', cursor: 'pointer'}} />
                                            Material Tax %
                                        </label>
                                        <input type="number" value={materialTax} onChange={(e) => setMaterialTax(e.target.value)} disabled={!includeTax} style={{opacity: includeTax ? 1 : 0.5}} />
                                    </div>
                                    <div className="setting-group">
                                        <label>Tax Basis</label>
                                        <select value={taxBasis} onChange={(e) => setTaxBasis(e.target.value)} disabled={!includeTax} style={{opacity: includeTax ? 1 : 0.5}}>
                                            <option value="raw">Raw + Adjustment</option>
                                            <option value="full">Full amount</option>
                                        </select>
                                    </div>
                                </div>
                                <div className="settings-buttons">
                                    <button onClick={handleSaveSettings} className="save-btn">Save Settings</button>
                                    <button onClick={handleResetSettings} className="reset-btn">Reset to Defaults</button>
                                </div>
                            </div>
                        )}

                        <div className="calculator-panel">
                            <div className="input-section">
                                <h2>Target Price & Split</h2>

                                <div className="input-group">
                                    <label>Target Price ($)</label>
                                    <input type="number" value={targetPrice} onChange={(e) => setTargetPrice(e.target.value)} className="large-input" />
                                </div>

                                <div className="split-section">
                                    <div className="split-labels">
                                        <span>Labor: {laborSplit.toFixed(1)}%</span>
                                        <span>Material: {(100 - laborSplit).toFixed(1)}%</span>
                                    </div>
                                    <input type="range" min="0" max="100" value={laborSplit} onChange={(e) => setLaborSplit(parseFloat(e.target.value))} className="split-slider" />
                                    <div className="split-inputs">
                                        <div className="split-input-group">
                                            <label className="split-input-label">Labor %</label>
                                            <div className="split-input-controls">
                                                <button onClick={() => adjustSplit(-1)} className="split-btn">−</button>
                                                <input type="number" min="0" max="100" value={Number.isInteger(laborSplit) ? laborSplit : laborSplit.toFixed(1)} onChange={(e) => setLaborSplit(Math.max(0, Math.min(100, parseFloat(e.target.value) || 0)))} />
                                                <button onClick={() => adjustSplit(1)} className="split-btn">+</button>
                                            </div>
                                        </div>
                                        <div className="split-input-group">
                                            <label className="split-input-label">Material %</label>
                                            <div className="split-input-controls">
                                                <button onClick={() => adjustSplit(1)} className="split-btn">−</button>
                                                <input type="number" min="0" max="100" value={Number.isInteger(100 - laborSplit) ? (100 - laborSplit) : (100 - laborSplit).toFixed(1)} onChange={(e) => setLaborSplit(Math.max(0, Math.min(100, 100 - (parseFloat(e.target.value) || 0))))} />
                                                <button onClick={() => adjustSplit(-1)} className="split-btn">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {results && targetPrice && (
                                    <div className="quick-reference">
                                        <div className="quick-ref-item">
                                            <div className="quick-ref-label">Labor Hours</div>
                                            <div className="quick-ref-value">{formatHours(results.laborHours)}</div>
                                        </div>
                                        <div className="quick-ref-item material">
                                            <div className="quick-ref-label">Raw Material Cost</div>
                                            <div className="quick-ref-value">{formatCurrency(results.rawMaterialCost)}</div>
                                        </div>
                                    </div>
                                )}

                                <div className="params-grid">
                                    <div className="params-column">
                                        <div className="param-group">
                                            <label>Labor Rate ($/hr)</label>
                                            <input type="number" value={laborRate} onChange={(e) => setLaborRate(e.target.value)} />
                                        </div>
                                        <div className="param-group">
                                            <label>Labor OH %</label>
                                            <input type="number" value={laborOH} onChange={(e) => setLaborOH(e.target.value)} />
                                        </div>
                                        <div className="param-group">
                                            <label>Labor Profit %</label>
                                            <input type="number" value={laborProfit} onChange={(e) => setLaborProfit(e.target.value)} />
                                        </div>
                                        {results && targetPrice && (
                                            <div className="entry-calcs labor-entry">
                                                <div className="entry-calc-item">
                                                    <span>Raw Labor Cost:</span>
                                                    <strong>{formatCurrency(results.rawLaborCost)}</strong>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div className="params-column">
                                        <div className="param-group">
                                            <label>Material Adj %</label>
                                            <input type="number" value={materialAdj} onChange={(e) => setMaterialAdj(e.target.value)} />
                                        </div>
                                        <div className="param-group">
                                            <label>Material OH %</label>
                                            <input type="number" value={materialOH} onChange={(e) => setMaterialOH(e.target.value)} />
                                        </div>
                                        <div className="param-group">
                                            <label>Material Profit %</label>
                                            <input type="number" value={materialProfit} onChange={(e) => setMaterialProfit(e.target.value)} />
                                        </div>
                                        <div className="param-group">
                                            <label style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                                <input type="checkbox" checked={includeTax} onChange={(e) => setIncludeTax(e.target.checked)} style={{width: '18px', height: '18px', cursor: 'pointer'}} />
                                                Material Tax %
                                            </label>
                                            <input type="number" value={materialTax} onChange={(e) => setMaterialTax(e.target.value)} disabled={!includeTax} style={{opacity: includeTax ? 1 : 0.5}} />
                                        </div>
                                        {results && targetPrice && (
                                            <div className="entry-calcs material-entry">
                                                <div className="entry-calc-item">
                                                    <span>Raw Material Cost:</span>
                                                    <strong>{formatCurrency(results.rawMaterialCost)}</strong>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {results && targetPrice && (
                                <div className="results-section">
                                    <h2>Breakdown</h2>
                                    <div className="results-grid">
                                        <div className="breakdown-card material-card">
                                            <h3>Material</h3>
                                            <div className="result-row highlight"><span>Raw Cost</span><strong>{formatCurrency(results.rawMaterialCost)}</strong></div>
                                            <div className="result-row"><span>+ Adjustment</span><span>{formatCurrency(results.materialAdjAmount)}</span></div>
                                            <div className="result-row"><span>+ Overhead</span><span>{formatCurrency(results.materialOHAmount)}</span></div>
                                            <div className="result-row"><span>+ Profit</span><span>{formatCurrency(results.materialProfitAmount)}</span></div>
                                            <div className="result-row"><span>+ Tax</span><span>{formatCurrency(results.materialTaxAmount)}</span></div>
                                            <div className="result-row total"><span>Total</span><strong>{formatCurrency(results.materialTotal)}</strong></div>
                                        </div>

                                        <div className="breakdown-card labor-card">
                                            <h3>Labor</h3>
                                            <div className="result-row highlight"><span>Hours Needed</span><strong>{formatHours(results.laborHours)}</strong></div>
                                            <div className="result-row"><span>Raw Cost</span><span>{formatCurrency(results.rawLaborCost)}</span></div>
                                            <div className="result-row"><span>+ Overhead</span><span>{formatCurrency(results.laborOHAmount)}</span></div>
                                            <div className="result-row"><span>+ Profit</span><span>{formatCurrency(results.laborProfitAmount)}</span></div>
                                            <div className="result-row total"><span>Subtotal</span><strong>{formatCurrency(results.laborSubtotal)}</strong></div>
                                        </div>
                                    </div>

                                    <div className="combined-total">
                                        <div className="total-row">
                                            <span>Combined Total</span>
                                            <strong className={results.combinedTotal === Math.round(parseFloat(targetPrice) * 100) / 100 ? 'match' : 'mismatch'}>
                                                {formatCurrency(results.combinedTotal)}
                                            </strong>
                                        </div>
                                        <div className="target-row">
                                            <span>Target Price</span>
                                            <strong>{formatCurrency(parseFloat(targetPrice))}</strong>
                                        </div>
                                        {Math.abs(results.combinedTotal - Math.round(parseFloat(targetPrice) * 100) / 100) > 0.01 && (
                                            <div className="warning">
                                                ⚠️ Total does not match target (rounding difference: {formatCurrency(Math.abs(results.combinedTotal - Math.round(parseFloat(targetPrice) * 100) / 100))})
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {!targetPrice && (
                                <div className="empty-state">
                                    <p>Enter a target price to see the breakdown</p>
                                </div>
                            )}
                        </div>
                    </div>

                    <footer className="backcalc-footer">
                        © 2026 by Shaya Birnbaum
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<BackCalc />);
    </script>
</body>
</html>
