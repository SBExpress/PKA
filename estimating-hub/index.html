<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimating Hub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>

        <div class="app-container">
            <!-- Header -->
            <div class="app-header">
                <h1>Estimating Hub</h1>
                <p class="subtitle">Your toolkit</p>
            </div>

            <!-- Content -->
            <div class="app-content">
                <div class="tools-section">
                    <!-- WireCalc -->
                    <a href="https://wirecalc.vercel.app/" target="_blank" class="tool-item">
                        <div class="tool-icon">⚡</div>
                        <div class="tool-text">
                            <h2>WireCalc</h2>
                            <p>Wire sizing & conduit</p>
                        </div>
                        <div class="tool-chevron">›</div>
                    </a>

                    <!-- V0 Site Calc -->
                    <a href="https://v0-site-calc.vercel.app/" target="_blank" class="tool-item">
                        <div class="tool-icon">📋</div>
                        <div class="tool-text">
                            <h2>V0 Site Calc</h2>
                            <p>Site assessment & labor</p>
                        </div>
                        <div class="tool-chevron">›</div>
                    </a>

                    <!-- BackCalc -->
                    <a href="https://sbexpress.github.io/backcalc/" target="_blank" class="tool-item">
                        <div class="tool-icon">💰</div>
                        <div class="tool-text">
                            <h2>BackCalc</h2>
                            <p>Reverse-engineer pricing</p>
                        </div>
                        <div class="tool-chevron">›</div>
                    </a>

                    <!-- PKA Dashboard -->
                    <a href="https://pka-git-master-birnbaumshaya-gmailcoms-projects.vercel.app/dashboard" target="_blank" class="tool-item">
                        <div class="tool-icon">📊</div>
                        <div class="tool-text">
                            <h2>PKA Dashboard</h2>
                            <p>Manage bids & projects</p>
                        </div>
                        <div class="tool-chevron">›</div>
                    </a>
                </div>
            </div>

            <!-- Footer -->
            <div class="app-footer">
                <p>Electrical Estimating Suite</p>
            </div>
        </div>

        <div class="phone-bottom"></div>
    </div>
</body>
</html>
